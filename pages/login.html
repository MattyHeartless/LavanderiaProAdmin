<!DOCTYPE html>
<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Inicio de Sesión - Panel Administrativo</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<style type="text/tailwindcss">:root {
    --primary-admin: #1e3a8a;
    --bg-subtle: #f3f4f6
    }
body {
    font-family: "Inter", sans-serif
    }
.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
    }
.bg-laundry-overlay {
    background-image: linear-gradient(to bottom, rgba(30, 58, 138, 0.4), rgba(15, 23, 42, 0.7)), url(https://lh3.googleusercontent.com/aida-public/AB6AXuCr6bYXSJQvzemCnmNKbi_8TiAckKZNVknmEM9c9RSO9BinKi7AwdskkTX2bytb331QK2m5zjBRHm2IAFRM3MLg2rqQds7BQpkx1SwKuWSXXx1Y1rht_uvOMOY4Xq1RETuCOkiOBBegpGxBwPl6S089O_6-uqyNVOnUOMRsPCwl2uzXa4Infvdqvgldr51Cy171HDmPIm29S33XHW3qVtsUV-j3ctbrjRAhFrsLHbupDbEnmrNtD84nCKkn0ETIfI_RN7eCqeMgys4);
    background-size: cover;
    background-position: center
    }</style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1e3a8a",
                        "admin-bg": "#f3f4f6",
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
</head>
<body class="bg-laundry-overlay min-h-screen flex items-center justify-center p-6 bg-fixed">
<div class="w-full max-w-md">
<div class="bg-white/95 backdrop-blur-md rounded-xl shadow-2xl border border-white/20 overflow-hidden">
<div class="pt-10 pb-6 px-10 text-center">
<div class="inline-flex items-center justify-center p-3 bg-primary/10 rounded-xl mb-4">
<span class="material-symbols-outlined text-primary text-4xl">local_laundry_service</span>
</div>
<h1 class="text-2xl font-bold text-slate-900 tracking-tight">LavaMaster <span class="text-primary font-black uppercase text-xs align-top ml-1">Admin</span></h1>
<p class="text-slate-500 text-sm mt-2 font-medium">Panel de Gestión Administrativa</p>
</div>
<form class="px-10 pb-8 space-y-5">
<div>
<label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5 ml-1" for="email">Correo electrónico institucional</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-slate-50/50 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none" id="email" placeholder="nombre@lavamaster.com" required="" type="email"/>
</div>
</div>
<div>
<label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5 ml-1" for="password">Contraseña</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-slate-50/50 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600" type="button">
<span class="material-symbols-outlined text-lg">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between py-1">
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-slate-300 rounded cursor-pointer" id="remember" type="checkbox"/>
<label class="ml-2 block text-sm text-slate-600 cursor-pointer" for="remember">Recordar sesión</label>
</div>
<a class="text-sm font-semibold text-primary hover:underline" href="#">¿Olvidaste tu contraseña?</a>
</div>
<button class="w-full bg-primary hover:bg-blue-900 text-white font-bold py-3.5 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 group" type="submit">
                    Ingresar al Panel
                    <span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">login</span>
</button>
</form>
<div class="bg-slate-50/80 border-t border-slate-100 px-10 py-4 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-amber-500 text-sm">verified_user</span>
<p class="text-[11px] font-bold text-slate-500 uppercase tracking-widest text-center">Acceso restringido a personal autorizado</p>
</div>
</div>
<p class="text-center mt-8 text-white/80 text-sm drop-shadow-sm">
            ¿Problemas con el acceso? <a class="font-bold text-white hover:text-blue-200 underline" href="#">Soporte IT</a>
</p>
</div>

</body></html>
