<app-service-list
  [services]="services()"
  [loading]="loading()"
  (createRequested)="startCreate(true)"
  (editRequested)="startEdit($event, true)"
  (deleteRequested)="deleteService($event)"
></app-service-list>

<app-service-form
  [mode]="formMode()"
  [submitting]="submitting()"
  [initialValue]="selectedService()"
  (cancelRequested)="cancelForm()"
  (saveRequested)="saveService($event)"
></app-service-form>
