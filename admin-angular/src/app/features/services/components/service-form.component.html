<div class="space-y-6 mt-8">
  <div class="flex items-center gap-3">
    <div class="h-8 w-1.5 bg-primary rounded-full"></div>
    <h2 class="text-2xl font-bold text-slate-900">
      @if (mode === 'create') {
        Crear Nuevo Servicio
      } @else {
        Editar Servicio
      }
    </h2>
  </div>
  <div class="bg-white rounded-xl border border-slate-200 p-8 shadow-sm">
    <form class="space-y-8" [formGroup]="serviceForm" (ngSubmit)="submit()">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-8">
        <div class="space-y-6">
          <div class="space-y-2">
            <label class="text-sm font-semibold text-slate-700">Nombre del Servicio</label>
            <input
              #nameInput
              class="w-full rounded-lg border-slate-200 focus:border-primary focus:ring-primary transition-all"
              placeholder="Ej. Lavado de Edredones"
              type="text"
              formControlName="name"
            />
          </div>
          <div class="space-y-2">
            <label class="text-sm font-semibold text-slate-700">Descripcion</label>
            <textarea
              class="w-full rounded-lg border-slate-200 focus:border-primary focus:ring-primary transition-all"
              placeholder="Escribe una breve descripcion del servicio..."
              rows="4"
              formControlName="description"
            ></textarea>
          </div>
        </div>
        <div class="space-y-6">
          <div class="grid grid-cols-2 gap-4">
            <div class="space-y-2">
              <label class="text-sm font-semibold text-slate-700">Unidad de Medida</label>
              <select
                class="w-full rounded-lg border-slate-200 focus:border-primary focus:ring-primary transition-all"
                formControlName="uoM"
              >
                <option value="KG">KG</option>
                <option value="PZ">PZ</option>
                <option value="DOC">DOC</option>
              </select>
            </div>
            <div class="space-y-2">
              <label class="text-sm font-semibold text-slate-700">Precio</label>
              <div class="relative">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 font-medium">$</span>
                <input
                  class="w-full pl-8 rounded-lg border-slate-200 focus:border-primary focus:ring-primary transition-all"
                  placeholder="0.00"
                  step="0.01"
                  type="number"
                  formControlName="price"
                />
              </div>
            </div>
          </div>
          <div class="space-y-2">
            <label class="text-sm font-semibold text-slate-700">Icono</label>
            <input
              class="w-full rounded-lg border-slate-200 focus:border-primary focus:ring-primary transition-all"
              placeholder="Ej. local_laundry_service"
              type="text"
              formControlName="icon"
            />
          </div>
          <div class="space-y-2">
            <label class="text-sm font-semibold text-slate-700">Tema del icono (clases CSS)</label>
            <input
              class="w-full rounded-lg border-slate-200 focus:border-primary focus:ring-primary transition-all text-sm"
              type="text"
              formControlName="themeIcon"
            />
          </div>
          <label class="flex items-center gap-2">
            <input class="h-4 w-4 rounded border-slate-300 text-primary" type="checkbox" formControlName="isActive" />
            <span class="text-sm text-slate-700">Servicio activo</span>
          </label>
        </div>
      </div>
      <div class="pt-6 border-t border-slate-100 flex justify-end gap-4">
        <button
          class="px-6 py-2.5 rounded-lg font-bold text-slate-600 hover:bg-slate-100 transition-all"
          type="button"
          [disabled]="submitting"
          (click)="cancelRequested.emit()"
        >
          Cancelar
        </button>
        <button
          class="px-8 py-2.5 bg-primary text-white font-bold rounded-lg hover:bg-primary/90 transition-all shadow-lg shadow-primary/20 disabled:opacity-70"
          type="submit"
          [disabled]="submitting"
        >
          @if (submitting) {
            Guardando...
          } @else if (mode === 'create') {
            Guardar Servicio
          } @else {
            Actualizar Servicio
          }
        </button>
      </div>
    </form>
  </div>
</div>
