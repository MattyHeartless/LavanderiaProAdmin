<app-courier-list
  [couriers]="couriers()"
  [loading]="loading()"
  (createRequested)="startCreate(true)"
  (editRequested)="startEdit($event, true)"
  (deleteRequested)="deleteCourier($event)"
></app-courier-list>

<app-courier-form
  [mode]="formMode()"
  [submitting]="submitting()"
  [initialValue]="selectedCourier()"
  (cancelRequested)="cancelForm()"
  (saveRequested)="saveCourier($event)"
></app-courier-form>
